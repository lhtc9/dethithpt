<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Admin thêm đề</title>

<style>

body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:30px;
}

h2{
  color:#2c7be5;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#2c7be5;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

</style>

</head>

<body>

<h2>Thêm đề mới</h2>

<input
  id="title"
  placeholder="Tên đề"
>

<select id="mon">

  <option value="toan">Toán</option>
  <option value="van">Văn</option>
  <option value="anh">Anh</option>
  <option value="li">Lý</option>
  <option value="su">Sử</option>
  <option value="dia">Địa</option>

</select>

<input
  id="link"
  placeholder="Link đề"
>

<button onclick="addExam()">
  Thêm đề
</button>

<script type="module">

import { db } from './firebase.js';

import {
  collection,
  addDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function addExam(){

  const title =
    document.getElementById("title").value;

  const mon =
    document.getElementById("mon").value;

  const link =
    document.getElementById("link").value;

  if(!title || !link){
    alert("Nhập đầy đủ!");
    return;
  }

  await addDoc(
    collection(db,"exams"),
    {
      title,
      mon,
      link
    }
  );

  alert("Đã thêm đề!");

  document.getElementById("title").value = "";
  document.getElementById("link").value = "";
}

window.addExam = addExam;

</script>

</body>
</html>
